{% extends 'base.html' %}

{% block title %}할일 수정{% endblock title %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h1 class="card-title">할일 수정</h1>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                {{ field.errors }}
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">수정 완료</button>
            {% comment %} 문제 08. 할일 수정 페이지 오류 디버깅 {% endcomment %}
            <a href="{% url 'todos:detail' todo.pk %}" class="btn btn-outline-secondary">취소</a>
        </form>
    </div>
</div>
{% endblock content %}
