<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도서 구매 서비스</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <div class="container my-5">
    <h1 class="display-5 mb-4">도서 구매 서비스</h1>
    <div class="row g-4">
      <div class="col-12 col-md-6 col-lg-4">
       <!-- col-12: 부트스트랩은 모바일 우선이므로, 별도의 표시가 없으면 기본적으로 12칸을 다 차지함 -->
       <!-- col-md-6: md 중단점인 768px 이상에서 6칸을 차지함 -->
       <!-- col-lg-4: lg 중단점인 992px 이상에서 4칸을 차지함 -->
        <div class="card h-100">
         <!-- h-100: 텍스트 양이 달라도 카드들의 높이가 일정하게 유지됨 -->
          <img src="book1.jpg" class="card-img-top" alt="도서 이미지">
           <!-- card-img-top: 이미지가 카드 너비를 벗어나지 않고 상단에 딱 맞게 배치됨 -->
          <div class="card-body">
            <h5 class="card-title">책 제목 1</h5>
              <p class="card-text">책 설명이 여기에 들어갑니다.</p>
              <a href="#" class="btn btn-primary">구매하기</a>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100">
          <img src="book1.jpg" class="card-img-top" alt="도서 이미지">
          <div class="card-body">
            <h5 class="card-title">책 제목 2</h5>
            <p class="card-text">책 설명이 여기에 들어갑니다.</p>
            <a href="#" class="btn btn-primary">구매하기</a>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100">
          <img src="book1.jpg" class="card-img-top" alt="도서 이미지">
          <div class="card-body">
            <h5 class="card-title">책 제목 3</h5>
            <p class="card-text">책 설명이 여기에 들어갑니다.</p>
            <a href="#" class="btn btn-primary">구매하기</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>
</html>
