<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>INDEX</h1>
  {% comment %} <h2>{{ articles }}</h2> {% endcomment %}
  {% for article in articles %}
    <div>
      <p>{{ article.pk }}</p>
      <p>
        <a href="{% url "articles:detail" article.pk %}">{{ article.title }}</a>
      </p>
      <p>{{ article.content }}</p>
    </div>
  {% endfor %}
</body>
</html>
