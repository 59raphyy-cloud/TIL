{% extends "accounts/base.html" %}

{% block content %}
  <!-- 로그인 -->
  <a href="{% url "accounts:login" %}">[LOGIN]</a>

  <!-- 회원가입 -->
  <a href="{% url "accounts:signup" %}">[Sign up]</a>

  <h1>전체 유저 목록</h1>
  <ul>
    {% for user in users %}
      <li>{{ user.username }}</li>
      <hr>
    {% endfor %}
  </ul>
{% endblock content %}
