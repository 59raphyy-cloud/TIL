<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Information</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="style_index.css" rel="stylesheet">
</head>

<body>
  <header class="header">
    <div class="top-bar">
      <span>둘리님의 프로필 페이지</span>
    </div>

    <nav class="navbar navbar-expand-lg custom-navbar">
      <div class="container justify-content-center">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main-navbar"
          aria-controls="main-navbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="main-navbar">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="index.html">기본 정보 수정</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="portfolio.html">포트폴리오 수정</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <h2 class="main-title">기본 정보 수정</h2>

  <div class="main-container">

    <div class="left-section">
      <h3>프로필 사진</h3>
      <img src="dooly.jpg" class="profile">

      <div class="intro-box">
        <h3 class="section-title">자기 소개</h3>
        <div class="custom-input-group">
          <textarea>나는 경제적 자유를 꿈꾼다. 둘리입니다.</textarea>
          <button type="button" class="update-btn">Update</button>
        </div>
      </div>
    </div>

    <div class="right-section">
      <div class="investment_info">
        <div class="checkbox-group">
          <h3>투자상품 선호도</h3>
          <label><input type="checkbox" name="interest"> 주식</label>
          <label><input type="checkbox" name="interest"> 채권</label>
          <label><input type="checkbox" name="interest"> 파생상품</label>
          <label><input type="checkbox" name="interest" checked> 부동산</label>
          <label><input type="checkbox" name="interest" checked> 가상화폐</label>
        </div>

        <div class="radio-group">
          <h3>투자 스타일</h3>
          <label><input type="radio" name="style"> 안정적</label>
          <label><input type="radio" name="style"> 중립적</label>
          <label><input type="radio" name="style" checked> 공격적</label>
        </div>

        <div class="checkbox-group">
          <h3>관심 종목</h3>
          <label><input type="checkbox" name="interest"> 정보기술</label>
          <label><input type="checkbox" name="interest"> 에너지</label>
          <label><input type="checkbox" name="interest"> 소재</label>
          <label><input type="checkbox" name="interest" checked> 소비재</label>
          <label><input type="checkbox" name="interest" checked> 금융</label>
        </div>
      </div>
    </div>

  </div>

  <div class="member-info-section">
    <hr class="divider">
    <h3 class="section-title">회원 상세 정보</h3>

    <div class="info-row">
      <label>회원 번호</label>
      <div class="custom-input-group no-button">
        <input type="text" value="1" readonly class="readonly-field">
      </div>
    </div>

    <div class="info-row">
      <label>ID</label>
      <div class="custom-input-group no-button">
        <input type="text" value="둘리" readonly class="readonly-field">
      </div>
    </div>

    <div class="info-row">
      <label>Email</label>
      <div class="custom-input-group">
        <input type="email" placeholder="이메일을 설정해 주세요 (e.g.,hoi@gmail.com)">
        <button type="button" class="update-btn">Update</button>
      </div>
    </div>

    <div class="info-row">
      <label>Nickname</label>
      <div class="custom-input-group">
        <input type="text" placeholder="닉네임을 설정해 주세요">
        <button type="button" class="update-btn">Update</button>
      </div>
    </div>

    <div class="info-row">
      <label>나이</label>
      <div class="custom-input-group">
        <input type="number" class="no-spinner" placeholder="나이를 설정해 주세요" min="0">
        <button type="button" class="update-btn">Update</button>
      </div>
    </div>

    <div class="asset-income-section">
      <label class="group-label">자산과 연봉</label>

      <div class="dual-container">
        <div class="half-input-group">
          <span class="unit">$</span>
          <input type="number" class="no-spinner" placeholder="현재 자산을 입력해 주세요">
        </div>

        <div class="half-input-group">
          <span class="unit">$</span>
          <input type="number" class="no-spinner" placeholder="연봉을 입력해 주세요">
          <button type="button" class="update-btn">Update</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  </body>

</html>
