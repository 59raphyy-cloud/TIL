<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Information</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="style_portfolio.css">
</head>

<body>
  <header class="header">
    <div class="top-bar">
      <span>둘리님의 프로필 페이지</span>
    </div>

    <nav class="navbar navbar-expand-lg custom-navbar">
      <div class="container justify-content-center">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main-navbar"
          aria-controls="main-navbar" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="main-navbar">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">기본 정보 수정</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="portfolio.html">포트폴리오 수정</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-5">
    <section class="card border-0 shadow-sm p-4 mx-auto" style="max-width: 800px;">
      <h2 class="text-center mb-4">포트폴리오 수정</h2>

      <form>
        <div class="mb-3">
          <label class="form-label">회원 번호</label>
          <input type="text" class="form-control" readonly value="1">
        </div>

        <div class="mb-3">
          <label class="form-label">ID</label>
          <input type="text" class="form-control" readonly value="김싸피">
        </div>

        <div class="mb-3">
          <label class="form-label">저축 성향</label>

          <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <div class="d-flex gap-2">
              <input type="radio" class="btn-check" name="savingStyle" id="style1">
              <label class="btn btn-outline-secondary" for="style1">도전형</label>

              <input type="radio" class="btn-check" name="savingStyle" id="style2">
              <label class="btn btn-outline-secondary" for="style2">검소형</label>

              <input type="radio" class="btn-check" name="savingStyle" id="style3">
              <label class="btn btn-outline-secondary" for="style3">알뜰형</label>
            </div>

            <button type="submit" class="btn btn-info text-white">Update</button>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">최애 은행</label>
          <div class="input-group">
            <input type="text" class="form-control" placeholder="주거래 은행을 입력해주세요">
            <button class="btn btn-info text-white" type="button">Update</button>
          </div>
        </div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
