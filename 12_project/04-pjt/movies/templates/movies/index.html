{% extends 'base.html' %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>영화 목록</h1>
    <a href="{% url 'movies:create' %}" class="btn btn-primary">새 영화 등록</a>
  </div>

  <hr>

  <div class="row row-cols-1 row-cols-md-3 g-4">
    {% for movie in movies %}
      <div class="col">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">{{ movie.title }}</h5>
            <p class="card-text text-truncate">{{ movie.description }}</p>
            <a href="{% url 'movies:detail' movie.pk %}" class="btn btn-outline-success">상세보기</a>
          </div>
        </div>
      </div>
    {% empty %}
      <div class="col-12 text-center mt-5">
        <p class="fs-5 text-muted text-nowrap">등록된 영화가 없습니다. 첫 번째 영화를 등록해 보세요!</p>
      </div>
    {% endfor %}
  </div>
{% endblock content %}
