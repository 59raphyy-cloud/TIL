{% extends 'base.html' %}

{% block content %}
  <h1 class="my-4">새 영화 등록</h1>
  <hr>
  <form action="{% url 'movies:create' %}" method="POST">
    {% csrf_token %}
    
    <div class="mb-3">
      {{ form.as_p }}
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">등록</button>
      <a href="{% url 'movies:index' %}" class="btn btn-outline-secondary">취소</a>
    </div>
  </form>
{% endblock content %}
