{% extends 'base.html' %}

{% block content %}
  <h1 class="my-4">영화 정보 수정</h1>
  <hr>
  <form action="{% url 'movies:update' movie.pk %}" method="POST">
    {% csrf_token %}

    <div class="mb-3">
      {{ form.as_p }}
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">저장</button>
      <a href="{% url 'movies:detail' movie.pk %}" class="btn btn-outline-secondary">취소</a>
    </div>
  </form>
{% endblock content %}
